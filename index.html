<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aiventra Tasks</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="header">
    <img src="https://i.postimg.cc/FKRm5Wyf/46595.png" class="logo">

    <div>
        <h2>Aiventra Tasks</h2>
        <p>Earn • Refer • Grow</p>
    </div>
</div>

<div class="balance-card">
    <div class="balance-title">
        Available Balance
    </div>

    <div class="balance">
        <span id="coins">250</span> Coins
    </div>
</div>

<div class="grid">

    <div class="card">
        <h3>🎁 Daily Reward</h3>
        <p>Claim free coins every day</p>

        <button class="btn" onclick="claimReward()">
            Claim Now
        </button>
    </div>

    <div class="card">
        <h3>📺 Watch Ads</h3>
        <p>Earn extra rewards</p>

        <button class="btn">
            Watch
        </button>
    </div>

</div>

<div class="tasks">

<h3>🔥 Available Tasks</h3>

<div class="task">
    <div class="task-left">
        <span>📢</span>
        <span>Join Telegram Channel</span>
    </div>

    <button class="task-btn" onclick="joinChannelReward()">
        +50
    </button>
</div>

<div class="task">
    <div class="task-left">
        <span>🌐</span>
        <span>Visit Partner Site</span>
    </div>

    <span class="reward">+30</span>
</div>

<div class="task">
    <div class="task-left">
        <span>👥</span>
        <span>Invite Friends</span>
    </div>

    <span class="reward">+100</span>
</div>

</div>

<div class="bottom-nav">
    <a href="#">🏠 Home</a>
    <a href="#">💰 Earn</a>
    <a href="#">👥 Refer</a>
    <a href="#">👤 Profile</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/tasks.js"></script>
<script src="js/app.js"></script>

</body>
</html>
